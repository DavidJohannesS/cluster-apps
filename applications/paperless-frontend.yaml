apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-frontend
  namespace: argocd-apps
spec:
  project: default
  source:
    repoURL: https://github.com/david-bachelor-project/frontend.git
    targetRevision: HEAD
    path: src/main/setup/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: paperless
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

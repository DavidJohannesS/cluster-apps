apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgejo-runner

resources:
  - runner-token-secret.yaml
  - namespace.yaml

helmCharts:
  - name: forgejo-runner
    releaseName: forgejo-runner
    namespace: forgejo-runner
    version: 0.1.13
    repo: oci://codeberg.org/wrenix/helm-charts
    valuesFile: values.yaml
patches:
  - target:
      kind: Job
      name: forgejo-runner-config-generate
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: public.ecr.aws/bitnami/kubectl:1.32.0

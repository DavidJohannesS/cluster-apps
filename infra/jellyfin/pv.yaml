apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-pv
spec:
  capacity:
    storage: 3Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: jellyfin-media
    volumeAttributes:
      source: "//192.168.0.7/media"
    nodeStageSecretRef:
      name: smb-creds
      namespace: default
    nodePublishSecretRef:
      name: smb-creds
      namespace: default

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-search
  namespace: argocd-apps
spec:
  project: default
  source:
    repoURL: https://github.com/DavidJohannesS/argocd-bootstrap.git
    targetRevision: HEAD
    path: infra/elastic-search
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
